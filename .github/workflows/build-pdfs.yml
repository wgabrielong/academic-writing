name: build pdfs

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - "**.tex"
      - "**.bib"
      - "**.sty"
      - "**.cls"
      - "**.bst"
      - "**.png"
      - "**.svg"
      - "**.jpg"
      - "**.jpeg"
      - "pages/**"

permissions:
  contents: write

concurrency:
  group: build-pdfs
  cancel-in-progress: false

jobs:
  detect:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.set-matrix.outputs.matrix }}
      has_targets: ${{ steps.set-matrix.outputs.has_targets }}
      pages_changed: ${{ steps.pages.outputs.changed }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Determine changed files
        id: changed
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "all=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          before="${{ github.event.before }}"
          if [ -z "$before" ] || [ "$before" = "0000000000000000000000000000000000000000" ] || ! git cat-file -e "$before" 2>/dev/null; then
            echo "all=true" >> "$GITHUB_OUTPUT"
          else
            echo "all=false" >> "$GITHUB_OUTPUT"
            git diff --name-only "$before" "${{ github.sha }}" > /tmp/changed_files.txt
          fi

      - name: Check for site asset changes
        id: pages
        run: |
          if [ "${{ steps.changed.outputs.all }}" = "true" ]; then
            echo "changed=true" >> "$GITHUB_OUTPUT"
          elif grep -q "^pages/" /tmp/changed_files.txt; then
            echo "changed=true" >> "$GITHUB_OUTPUT"
          else
            echo "changed=false" >> "$GITHUB_OUTPUT"
          fi

      # A "root" document is any .tex file with its own \documentclass; everything
      # it \input/\include's lives alongside it, so that directory is the rebuild scope.
      - name: Build matrix of root documents to compile
        id: set-matrix
        run: |
          set -e
          all="${{ steps.changed.outputs.all }}"
          include="["
          first=true
          while IFS= read -r root; do
            dir=$(dirname "$root")
            build=false
            if [ "$all" = "true" ]; then
              build=true
            elif grep -q "^${dir}/" /tmp/changed_files.txt; then
              build=true
            fi
            if [ "$build" = "true" ]; then
              file=$(basename "$root")
              name=$(echo "$root" | sed 's/[^A-Za-z0-9]/-/g')
              if [ "$first" = true ]; then first=false; else include+=","; fi
              include+="{\"root\":\"$root\",\"dir\":\"$dir\",\"file\":\"$file\",\"name\":\"$name\"}"
            fi
          done < <(grep -rl '\\documentclass' . --include='*.tex' | sed 's#^\./##' | sort)
          include+="]"

          if [ "$include" = "[]" ]; then
            echo "has_targets=false" >> "$GITHUB_OUTPUT"
          else
            echo "has_targets=true" >> "$GITHUB_OUTPUT"
          fi
          echo "matrix={\"include\":$include}" >> "$GITHUB_OUTPUT"
          echo "Targets: $include"

  build:
    needs: detect
    if: needs.detect.outputs.has_targets == 'true'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.detect.outputs.matrix) }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Cache Tectonic bundle
        uses: actions/cache@v4
        with:
          path: ~/.cache/Tectonic
          key: tectonic-${{ runner.os }}

      - name: Set up Tectonic
        uses: wtfjoke/setup-tectonic@v4

      # Tectonic's current bundle ships a biblatex.sty that emits .bcf control-file
      # version 3.8; biber's GitHub-released versions (2.18+, installable via the
      # action above) expect 3.9+ and reject it (tectonic-typesetting/tectonic#1267,
      # still open upstream). Biber 2.17 is the exact match (BCF_VERSION = 3.8 in
      # its source) but was never packaged as a GitHub Release, only tagged, so
      # fetch its official binary from SourceForge instead.
      - name: Install Biber 2.17 (matches Tectonic's bundled biblatex)
        run: |
          curl -fsSL -o /tmp/biber.tar.gz "https://sourceforge.net/projects/biblatex-biber/files/biblatex-biber/2.17/binaries/Linux/biber-linux_x86_64.tar.gz/download"
          tar -xzf /tmp/biber.tar.gz -C /tmp
          chmod +x /tmp/biber
          sudo mv /tmp/biber /usr/local/bin/biber
          biber --version

      - name: Compile ${{ matrix.root }}
        working-directory: ${{ matrix.dir }}
        run: tectonic "${{ matrix.file }}"

      - name: Stage PDF
        run: |
          out="artifact/${{ matrix.dir }}"
          mkdir -p "$out"
          cp "${{ matrix.dir }}/$(basename "${{ matrix.file }}" .tex).pdf" "$out/"

      - name: Upload PDF
        uses: actions/upload-artifact@v4
        with:
          name: pdf-${{ matrix.name }}
          path: artifact/**

  deploy:
    needs: [detect, build]
    if: always() && (needs.detect.outputs.has_targets == 'true' || needs.detect.outputs.pages_changed == 'true')
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download all PDFs
        if: needs.detect.outputs.has_targets == 'true'
        uses: actions/download-artifact@v4
        with:
          pattern: pdf-*
          path: github-deploy
          merge-multiple: true

      - name: Add site assets (favicon, landing page)
        run: |
          mkdir -p github-deploy
          cp -r pages/. github-deploy/

      - name: Deploy to build branch
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./github-deploy
          publish_branch: build
          keep_files: true
          user_name: github-actions[bot]
          user_email: github-actions[bot]@users.noreply.github.com
